<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OmniDownloader Helper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0F0B1A;
      color: #E8E0F5;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Aurora glows ── */
    .aurora {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .aurora::before {
      content: '';
      position: absolute;
      top: -60px; left: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: #7B68A0;
      opacity: 0.13;
      filter: blur(70px);
    }
    .aurora::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: #7ECAC4;
      opacity: 0.09;
      filter: blur(60px);
    }

    .container {
      position: relative; z-index: 1;
      padding: 18px 18px 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Header ── */
    .header { display: flex; flex-direction: column; gap: 3px; }
    .header-top { display: flex; align-items: center; gap: 12px; }
    .logo-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(123,104,160,0.3);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .title-block { display: flex; flex-direction: column; line-height: 1; }
    .title-omni {
      font-size: 20px; font-weight: 900;
      letter-spacing: -0.04em;
      color: #9580C0;
    }
    .title-down {
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #E8E0F5;
    }
    .header-version {
      font-size: 9px; font-weight: 700; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(200,190,230,0.35);
      padding-left: 52px; /* ~logo width + gap */
    }

    .url-bar {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(149, 128, 192, 0.2);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: relative;
      overflow: hidden;
    }
    .url-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: var(--lav-500);
      opacity: 0.5;
    }
    .url-bar-label {
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(149, 128, 192, 0.6);
    }
    .url-display {
      font-size: 11px;
      color: #E8E0F5;
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    /* ── Options ── */
    #optionsContent {
      display: none; /* Hidden until analysis */
      flex-direction: column;
      gap: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(149,128,192,0.1);
      border-radius: 16px;
      padding: 14px;
      margin-top: 4px;
      animation: fadeIn 0.5s ease;
    }
    #optionsContent.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 9px; font-weight: 800; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(200,190,230,0.5);
    }
    .field select, .field input {
      background: rgba(15, 11, 26, 0.6);
      border: 1px solid rgba(149, 128, 192, 0.2);
      border-radius: 10px; padding: 8px 10px;
      color: #E8E0F5; font-family: inherit; font-size: 12px;
      outline: none; transition: all 0.2s;
    }
    .field select:focus, .field input:focus { 
        border-color: rgba(126, 202, 196, 0.4);
        box-shadow: 0 0 0 3px rgba(126, 202, 196, 0.1);
    }
    .field select option { background: #1A1425; color: #E8E0F5; }

    /* ── Button ── */
    #downloadBtn {
      width: 100%;
      background: linear-gradient(135deg, #7B68A0 0%, #5BBAB3 100%);
      border: none;
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 8px 24px rgba(123, 104, 160, 0.3);
      position: relative;
      overflow: hidden;
    }
    #downloadBtn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }
    #downloadBtn:hover::after { left: 100%; }
    
    #downloadBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(123, 104, 160, 0.5);
      filter: brightness(1.1);
    }
    #downloadBtn:active { transform: translateY(0); }
    #downloadBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    #downloadBtn.success {
      background: linear-gradient(135deg, #7ECAC4, #3AA9A1);
      box-shadow: 0 8px 24px rgba(126, 202, 196, 0.4);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(149,128,192,0.3);
      margin-top: 4px;
    }

    /* ── Preview ── */
    #previewArea {
      display: none; flex-direction: column; gap: 0;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(149, 128, 192, 0.1);
      border-radius: 16px; 
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }
    #previewArea.active { display: flex; }
    #previewThumb {
      width: 100%; height: 120px;
      object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: opacity 0.3s;
    }
    #previewInfo {
       padding: 12px;
       background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }
    #previewTitle {
      font-size: 13px; font-weight: 700; color: #E8E0F5;
      line-height: 1.4; overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="aurora"></div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="logo-wrap">
          <img src="icons/icon128.png" alt="OmniDownloader" />
        </div>
        <div class="title-block">
          <span class="title-omni">OMNI</span>
          <span class="title-down">Downloader</span>
        </div>
      </div>
    </div>

    <!-- URL Bar -->
    <div class="url-bar">
      <span class="url-bar-label">Current Page</span>
      <div class="url-display" id="currentUrl">Detecting URL...</div>
    </div>

    <!-- Video Preview -->
    <div id="previewArea">
      <img id="previewThumb" src="" alt="" />
      <div id="previewInfo">
        <div id="previewTitle">Analyzing link...</div>
      </div>
    </div>

    <!-- Options content -->
    <div id="optionsContent">
      <div class="field">
        <label>Quality</label>
        <select id="qualitySelect">
          <option value="best">Best Available</option>
        </select>
      </div>

      <div class="field" id="subtitleField" style="display: none;">
        <label>Subtitles</label>
        <select id="subtitleSelect">
          <option value="none">No Subtitles</option>
        </select>
      </div>

      <div class="field">
        <label>Save Path</label>
        <input type="text" id="pathInput" placeholder="Default App Path" />
      </div>
    </div>

    <!-- Main Button -->
    <button id="downloadBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12M7 11l5 5 5-5M5 21h14"/>
      </svg>
      Add to Queue
    </button>

    <!-- Footer -->
    <div class="footer">Lavender Tech · v2.4</div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
