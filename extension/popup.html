<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OmniDownloader Helper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0F0B1A;
      color: #E8E0F5;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Aurora glows ── */
    .aurora {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .aurora::before {
      content: '';
      position: absolute;
      top: -60px; left: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: #7B68A0;
      opacity: 0.13;
      filter: blur(70px);
    }
    .aurora::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: #7ECAC4;
      opacity: 0.09;
      filter: blur(60px);
    }

    .container {
      position: relative; z-index: 1;
      padding: 18px 18px 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Header ── */
    .header { display: flex; flex-direction: column; gap: 3px; }
    .header-top { display: flex; align-items: center; gap: 12px; }
    .logo-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(123,104,160,0.3);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .title-block { display: flex; flex-direction: column; line-height: 1; }
    .title-omni {
      font-size: 20px; font-weight: 900;
      letter-spacing: -0.04em;
      color: #9580C0;
    }
    .title-down {
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #E8E0F5;
    }
    .header-version {
      font-size: 9px; font-weight: 700; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(200,190,230,0.35);
      padding-left: 52px; /* ~logo width + gap */
    }

    .url-display {
      font-size: 10px; color: rgba(200,190,230,0.28); margin-bottom: 2px;
      font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Options ── */
    .options-toggle {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(200,190,230,0.35);
      cursor: pointer; transition: color 0.2s;
    }
    .options-toggle:hover { color: rgba(200,190,230,0.6); }

    .options-content {
      display: none; flex-direction: column; gap: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(149,128,192,0.1);
      border-radius: 12px; padding: 12px; margin-top: -4px;
    }
    .options-content.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(200,190,230,0.4);
    }
    .field select, .field input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(149,128,192,0.15);
      border-radius: 6px; padding: 6px 8px;
      color: #E8E0F5; font-family: inherit; font-size: 11px;
      outline: none; transition: border-color 0.2s;
    }
    .field select:focus, .field input:focus { border-color: rgba(149,128,192,0.4); }
    .field select option { background: #1A1425; color: #E8E0F5; }

    /* ── Button ── */
    #downloadBtn {
      width: 100%;
      background: linear-gradient(135deg, #7B68A0, #5E4F80);
      border: 1px solid rgba(149,128,192,0.3);
      color: #fff;
      padding: 11px 16px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(123,104,160,0.25);
    }
    #downloadBtn:hover {
      background: linear-gradient(135deg, #9580C0, #7B68A0);
      box-shadow: 0 6px 28px rgba(149,128,192,0.45);
      transform: translateY(-1px);
    }
    #downloadBtn:active { transform: translateY(0); }
    #downloadBtn.success {
      background: linear-gradient(135deg, #7ECAC4, #5BA8A2);
      border-color: rgba(126,202,196,0.4);
      box-shadow: 0 4px 20px rgba(126,202,196,0.3);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(149,128,192,0.3);
    }

    /* ── Preview ── */
    #previewArea {
      display: none; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(149,128,192,0.1);
      border-radius: 12px; padding: 10px; margin-bottom: 12px;
      animation: fadeIn 0.4s ease;
    }
    #previewArea.active { display: flex; }
    #previewThumb {
      width: 70px; height: 40px; border-radius: 6px;
      object-fit: cover; border: 1px solid rgba(255,255,255,0.1);
    }
    #previewTitle {
      font-size: 11px; font-weight: 700; color: #E8E0F5;
      line-height: 1.4; overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="aurora"></div>

  <div class="container">

    <!-- Header (matches Downloader.tsx app header) -->
    <div class="header">
      <div class="header-top">
        <div class="logo-wrap">
          <img src="icons/icon48.png" alt="OmniDownloader" />
        </div>
        <div class="title-block">
          <span class="title-omni">OMNI</span>
          <span class="title-down">Downloader</span>
        </div>
      </div>
    </div>

    <!-- Video Preview -->
    <div id="previewArea">
      <img id="previewThumb" src="" alt="" />
      <div id="previewTitle">Analyzing link...</div>
    </div>

    <!-- Options toggle -->
    <div class="options-toggle" id="optionsToggle">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Options
    </div>

    <!-- Options content -->
    <div class="options-content" id="optionsContent">
      <div class="field">
        <label>Quality</label>
        <select id="qualitySelect">
          <option value="best">Best Available</option>
          <!-- Will be populated dynamicly -->
        </select>
      </div>

      <div class="field" id="subtitleField" style="display: none;">
        <label>Subtitle / Translation</label>
        <select id="subtitleSelect">
          <option value="none">No Subtitles</option>
          <!-- Will be populated dynamicly -->
        </select>
      </div>

      <div class="field">
        <label>Custom Path</label>
        <input type="text" id="pathInput" placeholder="Absolute path (optional)" />
      </div>
    </div>

    <!-- Current URL (subtle, above button) -->
    <div class="url-display" id="currentUrl"></div>

    <!-- Main Button -->
    <button id="downloadBtn">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12M7 11l5 5 5-5M5 21h14"/>
      </svg>
      Send to OmniDownloader
    </button>

    <!-- Footer -->
    <div class="footer">Lavender Tech · v2.4</div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
